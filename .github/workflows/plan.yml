name: Generate / Revise Plan

on:
  repository_dispatch:
    types: [notion-plan]

jobs:
  plan-agent:
    name: Plan Agent
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: ci/package-lock.json

      - name: Install CI dependencies
        run: npm ci
        working-directory: ci

      - name: Run plan agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_PAGE_ID: ${{ github.event.client_payload.page_id }}
          # Override these via repo variables if your Notion database uses different names
          NOTION_STATUS_PROPERTY: ${{ vars.NOTION_STATUS_PROPERTY || 'Status' }}
          NOTION_WAITING_VALUE: ${{ vars.NOTION_WAITING_VALUE || 'Waiting Approval' }}
          REPO_ROOT: ${{ github.workspace }}
        run: npx ts-node agents/plan-agent.ts
        working-directory: ci

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          # Keyed by page ID so multiple tickets don't clobber each other
          name: plan-${{ github.event.client_payload.page_id }}
          path: ci/plan.json
          retention-days: 30
